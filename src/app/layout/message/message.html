<section class="msg-section" id="message">
  <h2 class="heading">Send Me a <span>Message</span> 💬</h2>
  <p class="sub-heading">Got a question or opportunity? I'd love to hear from you!</p>

  <div class="form-wrapper">
    <div class="success-box" *ngIf="submitted">
      <i class="fas fa-check-circle"></i>
      <p>Message sent successfully! I'll get back to you soon 🚀</p>
    </div>

    <form *ngIf="!submitted" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="field">
        <label>Name</label>
        <input type="text" formControlName="name" placeholder="Your name">
      </div>

      <div class="field">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="your@email.com">
      </div>

      <div class="field">
        <label>Message</label>
        <textarea formControlName="message" rows="5" placeholder="Write your message..."></textarea>
      </div>

      <button type="submit" [disabled]="form.invalid || loading" class="send-btn">
        <span *ngIf="!loading"><i class="fas fa-paper-plane"></i> Send Message</span>
        <span *ngIf="loading">Sending...</span>
      </button>
    </form>
  </div>
</section>
