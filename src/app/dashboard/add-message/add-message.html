<div class="dashboard-container">

  <div class="form-card">
    <div class="card-title-row">
      <h2>📬 Messages</h2>
      <span class="badge" *ngIf="unreadCount > 0">{{ unreadCount }} new</span>
    </div>
  </div>

  <div class="loading" *ngIf="loading">
    <i class="fas fa-spinner fa-spin"></i> Loading...
  </div>

  <div class="empty-state" *ngIf="!loading && messages.length === 0">
    <i class="fas fa-inbox"></i>
    <p>No messages yet</p>
  </div>

  <div class="messages-list" *ngIf="!loading && messages.length > 0">
    <div
      class="message-item"
      *ngFor="let m of messages"
      [class.unread]="!m.isRead"
    >
      <div class="message-top">
        <div class="sender-info">
          <div class="avatar">{{ m.name.charAt(0).toUpperCase() }}</div>
          <div class="sender-text">
            <strong class="sender-name">{{ m.name }}</strong>
            <span class="sender-email">{{ m.email }}</span>
          </div>
        </div>
        <div class="message-meta">
          <span class="date">{{ m.createdAt | date: 'MMM d, y' }}</span>
          <span class="unread-dot" *ngIf="!m.isRead"></span>
        </div>
      </div>

      <p class="message-body">{{ m.message }}</p>

      <div class="item-actions">
        <button *ngIf="!m.isRead" class="edit-btn" (click)="markAsRead(m._id!)">
          <i class="fas fa-check"></i> Mark as Read
        </button>
        <span class="read-label" *ngIf="m.isRead">
          <i class="fas fa-check-double"></i> Read
        </span>
        <button class="del-btn" (click)="deleteMessage(m._id!)">
          <i class="fas fa-trash"></i> Delete
        </button>
      </div>
    </div>
  </div>

</div>
