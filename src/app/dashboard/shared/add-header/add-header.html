<header class="dash-header">

  <!-- Logo -->
  <div class="dash-logo">
    <i class="fas fa-layer-group"></i>
    <span>Dashboard</span>
  </div>

  <!-- Desktop Nav -->
  <nav class="dash-nav">
    <a
      class="dash-link"
      *ngFor="let item of navItems"
      [routerLink]="item.route"
      routerLinkActive="active"
    >
      <i [class]="item.icon"></i>
      <span>{{ item.label }}</span>
    </a>
  </nav>

  <!-- ✅ Logout -->
  <button class="logout-btn" (click)="logout()">
    <i class="fas fa-sign-out-alt"></i>
    <span>Logout</span>
  </button>

  <!-- Burger -->
  <button class="dash-burger" (click)="toggleMenu()" [class.open]="menuOpen">
    <span></span><span></span><span></span>
  </button>

  <!-- Mobile -->
  <div class="dash-mobile" [class.open]="menuOpen">
    <a
      class="dash-mobile-link"
      *ngFor="let item of navItems"
      [routerLink]="item.route"
      routerLinkActive="active"
      (click)="menuOpen = false"
    >
      <i [class]="item.icon"></i>
      {{ item.label }}
    </a>
    <button class="dash-mobile-logout" (click)="logout()">
      <i class="fas fa-sign-out-alt"></i> Logout
    </button>
  </div>

</header>
