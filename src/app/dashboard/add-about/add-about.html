<div class="dashboard-container">
  <div class="form-card">
    <h2>{{ editingId ? 'Update About Section' : 'Add About Section' }}</h2>
    <form [formGroup]="aboutForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Heading</label>
        <input type="text" formControlName="heading">
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea formControlName="description"></textarea>
      </div>
      <div class="form-group">
        <label>Image</label>
        <input type="file" (change)="onFileSelected($event)">
      </div>
      <button class="primary-btn" type="submit">
        {{ editingId ? 'Update' : 'Add' }}
      </button>
      <div class="alert success" *ngIf="successMessage">{{ successMessage }}</div>
    </form>
  </div>

  <div class="table-card">
    <h2>About Content</h2>
    <div class="about-list">
      <div class="about-item" *ngFor="let item of abouts">
        <div class="item-info">
          <strong>{{ item.heading }}</strong>
          <span class="item-desc">{{ item.description }}</span>
        </div>
        <div class="item-actions">
          <button class="edit-btn" (click)="editAbout(item)">Edit</button>
          <button class="delete-btn" (click)="deleteAbout(item._id!)">Delete</button>
        </div>
      </div>
    </div>
  </div>
</div>
