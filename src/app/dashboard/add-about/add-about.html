<div class="dashboard-container">
  <div class="form-card">
    <h2>{{ editingId ? 'Update About Section' : 'Add About Section' }}</h2>
    <form [formGroup]="aboutForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Heading</label>
        <input type="text" formControlName="heading">
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea formControlName="description"></textarea>
      </div>
      <div class="form-group">
        <label>Image</label>
        <input type="file" (change)="onFileSelected($event)">
      </div>
      <button class="primary-btn" type="submit">
        {{ editingId ? 'Update' : 'Add' }}
      </button>
    </form>
    <div class="alert success" *ngIf="successMessage">{{ successMessage }}</div>
  </div>

  <div class="table-card">
    <h2>About Content</h2>
    <table>
      <thead>
        <tr>
          <th>Heading</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of abouts">
          <td>{{ item.heading }}</td>
          <td>
            <button class="edit-btn" (click)="editAbout(item)">Edit</button>
            <button class="delete-btn" (click)="deleteAbout(item._id!)">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
